services:
  db:
    image: postgres:17.6-alpine3.22
    container_name: sumni-finance-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-sumni-finance}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - sumni
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-sumni-finance}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/quangbach27/sumni-finance-backend:75133e3ed9c83aeae0b010d6a0d3111ac1b044d3
    container_name: sumni-finance-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - BANK_LOOKUP_BASE_URL=https://api.vietqr.io
      - APP_ENV=staging
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - sumni
    depends_on:
      db:
        condition: service_healthy

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./docker/observability/loki/config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sumni

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./docker/observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - sumni
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - sumni
    depends_on:
      - loki

networks:
  sumni:
    driver: bridge

volumes:
  pg_data:
  loki_data:
  grafana_data:
