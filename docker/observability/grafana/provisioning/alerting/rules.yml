apiVersion: 1

groups:
  - orgId: 1
    name: backend
    folder: Backend Alerts
    interval: 1m
    rules:

      # Fires when any error-level log appears in the last 5 minutes
      - uid: backend-error-logs
        title: Backend Error Logs
        condition: threshold
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              editorMode: code
              expr: 'sum(count_over_time({container="sumni-finance-backend"} | json | level="error" [5m]))'
              instant: true
              queryType: instant
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 0s
        isPaused: false
        annotations:
          summary: "Error logs detected in backend"
          description: "{{ $values.A.Value }} error(s) found in sumni-finance-backend over the last 5 minutes."
        labels:
          severity: warning

      # Fires when the backend logs go silent for 2 minutes (crash / OOM / restart loop)
      - uid: backend-down
        title: Backend Down
        condition: threshold
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: loki
            model:
              editorMode: code
              expr: 'sum(count_over_time({container="sumni-finance-backend"}[2m]))'
              instant: true
              queryType: instant
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
        noDataState: Alerting
        execErrState: Error
        for: 2m
        isPaused: false
        annotations:
          summary: "Backend is not producing logs"
          description: "No logs received from sumni-finance-backend for the past 2 minutes — it may be down or crash-looping."
        labels:
          severity: critical

      # Fires when error rate spikes — more than 10 errors in 5 minutes
      - uid: backend-high-error-rate
        title: Backend High Error Rate
        condition: threshold
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              editorMode: code
              expr: 'sum(count_over_time({container="sumni-finance-backend"} | json | level="error" [5m]))'
              instant: true
              queryType: instant
              refId: A
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 0s
        isPaused: false
        annotations:
          summary: "High error rate in backend"
          description: "{{ $values.A.Value }} errors in the last 5 minutes — exceeds threshold of 10."
        labels:
          severity: critical
