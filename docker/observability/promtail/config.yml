server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip leading slash from container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
    pipeline_stages:
      # Parse the log line as JSON so we can filter by fields in LogQL
      - json:
          expressions:
            level: level
            # correlation_id is intentionally NOT extracted as a label (high cardinality).
            # Search with: {container="sumni-finance-backend"} | json | correlation_id="<id>"
      - labels:
          level:
