name: Deploy Backend

on:
  repository_dispatch:
    types: [deploy-backend]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Backend image tag to deploy"
        default: "latest"
        required: true

concurrency:
  group: vps-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy backend service to VPS
    runs-on: ubuntu-24.04
    environment: staging
    env:
      DOCKER_PATH: "/opt/sumni-finance/docker"
      BACKEND_IMAGE_TAG: ${{ github.event.client_payload.image_tag || inputs.image_tag || 'latest' }}
    permissions:
      packages: read
    steps:
      - name: Build POSTGRES_URL
        id: db_url
        env:
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_HOST: ${{ vars.DB_HOST }}
        run: |
          ENCODED_PW=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['DB_PASSWORD'], safe=''))")
          echo "::add-mask::${ENCODED_PW}"
          URL="postgres://${DB_USER}:${ENCODED_PW}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable"
          echo "::add-mask::${URL}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_URL: ${{ steps.db_url.outputs.url }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          BACKEND_IMAGE_TAG: ${{ env.BACKEND_IMAGE_TAG }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_URL,CORS_ALLOWED_ORIGINS,BACKEND_IMAGE_TAG,GHCR_USER,GHCR_TOKEN
          script: |
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            cd ${{ env.DOCKER_PATH }}
            docker compose pull backend
            docker compose up -d --no-deps backend
