name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: vps-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy services to VPS
    runs-on: ubuntu-24.04
    environment: staging
    env:
      DOCKER_PATH: "/opt/sumni-finance/docker"
    permissions:
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker/docker-compose.yml,docker/grafana/"
          target: ${{ env.DOCKER_PATH }}
          strip_components: 1
          rm: false

      - name: Start DB and Alloy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ vars.DB_NAME }}
          LOKI_URL: ${{ secrets.LOKI_URL }}
          LOKI_USERNAME: ${{ secrets.LOKI_USERNAME }}
          LOKI_PASSWORD: ${{ secrets.LOKI_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_USER,DB_PASSWORD,DB_NAME,LOKI_URL,LOKI_USERNAME,LOKI_PASSWORD
          script: |
            cd ${{ env.DOCKER_PATH }}
            docker compose rm -sf db alloy
            docker compose up -d db alloy